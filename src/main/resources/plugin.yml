id: bilibili-publisher
name: Bilibili 动态源插件
version: 0.0.1
mainClass: top.colter.dynamic.bilibili.BilibiliPublisherPlugin
apiVersion: 1.0.0
description: Bilibili 动态轮询、登录与订阅分发。
author: dynamic-bot
drawAssets:
  - platformId: bilibili
    key: default.header
    kind: DEFAULT_HEADER
    resourcePath: draw/bilibili/header/default.png
    mimeType: image/png
  - platformId: bilibili
    key: logo.primary
    kind: LOGO
    resourcePath: draw/bilibili/logo/primary.png
    mimeType: image/png
  - platformId: bilibili
    key: logo.wordmark
    kind: LOGO
    resourcePath: draw/bilibili/logo/wordmark.png
    mimeType: image/png
  - platformId: bilibili
    key: avatarBadge.official.individual
    kind: AVATAR_BADGE
    resourcePath: draw/bilibili/avatar-badge/official-individual.svg
    mimeType: image/svg+xml
  - platformId: bilibili
    key: avatarBadge.official.institution
    kind: AVATAR_BADGE
    resourcePath: draw/bilibili/avatar-badge/official-institution.svg
    mimeType: image/svg+xml
  - platformId: bilibili
    key: content.icon.video
    kind: CONTENT_ICON
    resourcePath: draw/bilibili/icon/VIDEO.svg
    mimeType: image/svg+xml
  - platformId: bilibili
    key: content.icon.link
    kind: CONTENT_ICON
    resourcePath: draw/bilibili/icon/LINK.svg
    mimeType: image/svg+xml
  - platformId: bilibili
    key: content.icon.topic
    kind: CONTENT_ICON
    resourcePath: draw/bilibili/icon/TOPIC.svg
    mimeType: image/svg+xml
  - platformId: bilibili
    key: content.icon.vote
    kind: CONTENT_ICON
    resourcePath: draw/bilibili/icon/VOTE.svg
    mimeType: image/svg+xml
  - platformId: bilibili
    key: content.icon.goods
    kind: CONTENT_ICON
    resourcePath: draw/bilibili/icon/GOODS.svg
    mimeType: image/svg+xml
  - platformId: bilibili
    key: content.icon.lottery
    kind: CONTENT_ICON
    resourcePath: draw/bilibili/icon/LOTTERY.svg
    mimeType: image/svg+xml
  - platformId: bilibili
    key: content.icon.dispute
    kind: CONTENT_ICON
    resourcePath: draw/bilibili/icon/DISPUTE.svg
    mimeType: image/svg+xml
